<details
  class="filter-details"
  {% if filters.expansion or filters.category or filters.username or filters.counterparty_name
        or filters.country or filters.currency or filters.min_amount is not none
        or filters.max_amount is not none or filters.min_quantity is not none
        or filters.max_quantity is not none or filters.comments or filters.import_file
        or filters.import_status or filters.link_status %}open{% endif %}
>
  <summary>Weitere Filter</summary>
  <div class="filter-row filter-details-fields">
    <div class="field">
      <label for="expansion">Set</label>
      <input id="expansion" name="expansion" value="{{ filters.expansion or '' }}">
    </div>
    <div class="field">
      <label for="category">Kategorie</label>
      <input id="category" name="category" value="{{ filters.category or '' }}">
    </div>
    <div class="field">
      <label for="username">Benutzername</label>
      <input id="username" name="username" value="{{ filters.username or '' }}">
    </div>
    <div class="field">
      <label for="counterparty_name">Name</label>
      <input id="counterparty_name" name="counterparty_name" value="{{ filters.counterparty_name or '' }}">
    </div>
    <div class="field">
      <label for="country">Land</label>
      <input id="country" name="country" value="{{ filters.country or '' }}">
    </div>
    <div class="field compact-field">
      <label for="currency">W&auml;hrung</label>
      <input id="currency" name="currency" value="{{ filters.currency or '' }}">
    </div>
    <div class="field compact-field">
      <label for="min_amount">Betrag von</label>
      <input id="min_amount" name="min_amount" type="number" step="0.01" value="{{ filters.min_amount if filters.min_amount is not none else '' }}">
    </div>
    <div class="field compact-field">
      <label for="max_amount">Betrag bis</label>
      <input id="max_amount" name="max_amount" type="number" step="0.01" value="{{ filters.max_amount if filters.max_amount is not none else '' }}">
    </div>
    <div class="field compact-field">
      <label for="min_quantity">Menge von</label>
      <input id="min_quantity" name="min_quantity" type="number" min="0" step="1" value="{{ filters.min_quantity if filters.min_quantity is not none else '' }}">
    </div>
    <div class="field compact-field">
      <label for="max_quantity">Menge bis</label>
      <input id="max_quantity" name="max_quantity" type="number" min="0" step="1" value="{{ filters.max_quantity if filters.max_quantity is not none else '' }}">
    </div>
    <div class="field">
      <label for="comments">Kommentar enth&auml;lt</label>
      <input id="comments" name="comments" value="{{ filters.comments or '' }}">
    </div>
    <div class="field">
      <label for="import_file">Importdatei</label>
      <input id="import_file" name="import_file" value="{{ filters.import_file or '' }}">
    </div>
    <div class="field">
      <label for="import_status">Importstatus</label>
      <select id="import_status" name="import_status">
        <option value="" {% if not filters.import_status %}selected{% endif %}>Alle</option>
        {% for status in ['imported', 'failed', 'conflict', 'processing', 'pending'] %}
        <option value="{{ status }}" {% if filters.import_status == status %}selected{% endif %}>{{ status|status_label }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="field">
      <label for="link_status">Verkn&uuml;pfung</label>
      <select id="link_status" name="link_status">
        <option value="" {% if not filters.link_status %}selected{% endif %}>Alle</option>
        <option value="linked" {% if filters.link_status == 'linked' %}selected{% endif %}>Verkn&uuml;pft</option>
        <option value="unlinked" {% if filters.link_status == 'unlinked' %}selected{% endif %}>Nicht verkn&uuml;pft</option>
      </select>
    </div>
  </div>
</details>
