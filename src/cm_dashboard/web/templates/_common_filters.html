<div class="field">
  <label for="start_date">Von</label>
  <input id="start_date" name="start_date" type="date" value="{{ filters.start_date or '' }}">
</div>
<div class="field">
  <label for="end_date">Bis</label>
  <input id="end_date" name="end_date" type="date" value="{{ filters.end_date or '' }}">
</div>
<div class="field">
  <label for="direction">Richtung</label>
  <select id="direction" name="direction">
    <option value="" {% if not filters.direction %}selected{% endif %}>Beide</option>
    <option value="PURCHASED" {% if filters.direction == 'PURCHASED' %}selected{% endif %}>Gekauft</option>
    <option value="SOLD" {% if filters.direction == 'SOLD' %}selected{% endif %}>Verkauft</option>
  </select>
</div>
<div class="field">
  <label for="date_basis">Datumsbasis</label>
  <select id="date_basis" name="date_basis">
    <option value="PAYMENTDATE" {% if filters.date_basis == 'PAYMENTDATE' %}selected{% endif %}>Zahlungsdatum</option>
    <option value="PURCHASEDATE" {% if filters.date_basis == 'PURCHASEDATE' %}selected{% endif %}>Kaufdatum</option>
  </select>
</div>
