<div class="field">
  <label for="start_date">From</label>
  <input id="start_date" name="start_date" type="date" value="{{ filters.start_date or '' }}">
</div>
<div class="field">
  <label for="end_date">To</label>
  <input id="end_date" name="end_date" type="date" value="{{ filters.end_date or '' }}">
</div>
<div class="field">
  <label for="direction">Direction</label>
  <select id="direction" name="direction">
    <option value="" {% if not filters.direction %}selected{% endif %}>Both</option>
    <option value="PURCHASED" {% if filters.direction == 'PURCHASED' %}selected{% endif %}>Purchased</option>
    <option value="SOLD" {% if filters.direction == 'SOLD' %}selected{% endif %}>Sold</option>
  </select>
</div>
<div class="field">
  <label for="date_basis">Date basis</label>
  <select id="date_basis" name="date_basis">
    <option value="PAYMENTDATE" {% if filters.date_basis == 'PAYMENTDATE' %}selected{% endif %}>Payment date</option>
    <option value="PURCHASEDATE" {% if filters.date_basis == 'PURCHASEDATE' %}selected{% endif %}>Purchase date</option>
  </select>
</div>
